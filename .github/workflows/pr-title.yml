name: Validate PR title

# Validate that PR titles follow Conventional Commits
# (https://www.conventionalcommits.org/).
# Runs on every PR open/edit/sync so the merge commit message stays consistent.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  check:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        with:
          # Regex `.*` rejects all scopes — we don't use scoped prefixes.
          disallowScopes: |
            .*
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
